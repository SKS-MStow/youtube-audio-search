name: YouTubeAudioSearch
options:
  bundleIdPrefix: xyz.verdalecres
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: V8W579ZBVB
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_VERSION: "6.0"
targets:
  YouTubeAudioSearch:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: YouTubeAudioSearch/Sources
      - path: YouTubeAudioSearch/Resources/Assets.xcassets
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xyz.verdalecres.youtubeaudiosearch
        PRODUCT_NAME: YouTube Audio Search
        INFOPLIST_FILE: YouTubeAudioSearch/Resources/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
schemes:
  YouTubeAudioSearch:
    build:
      targets:
        YouTubeAudioSearch: all
    run:
      config: Debug
    archive:
      config: Release
